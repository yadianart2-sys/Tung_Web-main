  <circle cx="50" cy="50" r="46" fill="#050505" stroke="url(#g)" stroke-width="4" filter="url(#glow)"/>
  <text x="50" y="40" text-anchor="middle" fill="url(#g)" font-family="Arial Black, sans-serif" font-size="22" font-weight="900">TUNG</text>
